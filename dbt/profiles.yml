# Run dbt with --profiles-dir dbt  (or set DBT_PROFILES_DIR=dbt)
transitlake:
  target: dev
  outputs:
    dev:
      type: duckdb
      # Same DuckDB file the Dagster lake uses. Default is relative to the repo root
      # (CLI/CI run dbt from there); Dagster sets TRANSITLAKE_DUCKDB to an absolute
      # path since dagster-dbt runs dbt from the project dir.
      path: "{{ env_var('TRANSITLAKE_DUCKDB', 'lake/transitlake.duckdb') }}"
      threads: 4
      # Lets dbt-duckdb read the Parquet lake directly via external sources.
      extensions:
        - parquet
