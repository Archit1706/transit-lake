version: 2

models:
  # --- Dimensions ---
  - name: dim_date
    description: Date spine 2018–2026.
    columns:
      - name: date_day
        tests: [not_null, unique]
      - name: date_key
        tests: [not_null, unique]

  - name: dim_agency
    columns:
      - name: agency
        tests: [not_null, unique]

  - name: dim_mode
    columns:
      - name: mode
        tests:
          - not_null
          - unique
          - accepted_values:
              values: ['bus', 'train']

  - name: dim_route
    description: Bus + rail routes; covers every route id seen in the RT feeds.
    columns:
      - name: route_sk
        tests: [not_null, unique]
      - name: route_id
        tests: [not_null]
      - name: mode
        tests:
          - accepted_values:
              values: ['bus', 'train']

  - name: dim_stop
    columns:
      - name: stop_sk
        tests: [not_null, unique]
      - name: stop_id
        tests: [not_null, unique]
      - name: stop_lat
        tests:
          - in_range: {min_value: 41, max_value: 43}
      - name: stop_lon
        tests:
          - in_range: {min_value: -89, max_value: -87}

  - name: dim_segment
    columns:
      - name: segment_id
        tests: [not_null, unique]
      - name: segment_sk
        tests: [not_null, unique]
      - name: start_lat
        tests:
          - in_range: {min_value: 41, max_value: 43}
      - name: start_lon
        tests:
          - in_range: {min_value: -89, max_value: -87}

  # --- Facts (referential integrity to dims) ---
  - name: fact_vehicle_position
    description: One row per RT position report; the atomic transit fact.
    columns:
      - name: position_sk
        tests: [not_null, unique]
      - name: route_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_route')
              field: route_sk
      - name: date_key
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: mode
        tests:
          - accepted_values:
              values: ['bus', 'train']
      - name: lat
        tests:
          - in_range: {min_value: 41, max_value: 43}
      - name: lon
        tests:
          - in_range: {min_value: -89, max_value: -87}
      - name: report_hour
        tests:
          - in_range: {min_value: 0, max_value: 23}

  - name: fact_trip_delay
    columns:
      - name: position_sk
        tests: [not_null, unique]
      - name: route_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_route')
              field: route_sk
      - name: date_key
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_key

  - name: fact_congestion
    columns:
      - name: congestion_sk
        tests: [not_null, unique]
      - name: segment_sk
        tests:
          - not_null
          - relationships:
              to: ref('dim_segment')
              field: segment_sk
      - name: date_key
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_key
      - name: speed_mph
        tests:
          - in_range: {min_value: 0, max_value: 80}
      - name: report_hour
        tests:
          - in_range: {min_value: 0, max_value: 23}

  - name: fact_weather_daily
    columns:
      - name: date_key
        tests: [not_null, unique]
      - name: weather_date
        tests:
          - relationships:
              to: ref('dim_date')
              field: date_day
      - name: temp_max_c
        tests:
          - in_range: {min_value: -40, max_value: 50}
      - name: precip_mm
        tests:
          - in_range: {min_value: 0, max_value: 500}

  # --- Analytics marts ---
  - name: mart_otp_by_route
    columns:
      - name: route_id
        tests: [not_null]
      - name: on_time_rate
        tests:
          - in_range: {min_value: 0, max_value: 1}
  - name: mart_otp_by_mode_hour
    columns:
      - name: report_hour
        tests:
          - in_range: {min_value: 0, max_value: 23}
      - name: on_time_rate
        tests:
          - in_range: {min_value: 0, max_value: 1}
  - name: mart_otp_by_route_hour
    columns:
      - name: report_hour
        tests:
          - in_range: {min_value: 0, max_value: 23}
      - name: on_time_rate
        tests:
          - in_range: {min_value: 0, max_value: 1}
  - name: mart_congestion_hotspots
    columns:
      - name: segment_id
        tests: [not_null, unique]
      - name: avg_speed_mph
        tests:
          - in_range: {min_value: 0, max_value: 80}
  - name: mart_congestion_by_hour
    columns:
      - name: report_hour
        tests:
          - not_null
          - in_range: {min_value: 0, max_value: 23}
      - name: avg_speed_mph
        tests:
          - in_range: {min_value: 0, max_value: 80}
  - name: mart_daily_delay_trend
    columns:
      - name: delayed_rate
        tests:
          - in_range: {min_value: 0, max_value: 1}
  - name: mart_delay_vs_weather
    description: Daily transit delay rate joined to weather.
    columns:
      - name: delayed_rate
        tests:
          - in_range: {min_value: 0, max_value: 1}
  - name: mart_delay_vs_congestion
    description: Transit delay vs road speed by hour-of-day profile.
    columns:
      - name: report_hour
        tests:
          - in_range: {min_value: 0, max_value: 23}
  - name: mart_pipeline_freshness
    description: Latest timestamp and row count per fact source.
